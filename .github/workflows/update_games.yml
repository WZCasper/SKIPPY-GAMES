name: Update game catalog

on:
  schedule:
    # Каждые 6 часов: парсер работает инкрементально (см. backend/parser.py),
    # поэтому частые короткие прогоны быстрее доводят каталог до целевого
    # размера (10 000+ игр), чем один длинный прогон раз в сутки.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'backend/custom_ids.txt'
      - 'backend/parser.py'

permissions:
  contents: write

concurrency:
  group: update-games-json
  cancel-in-progress: false

jobs:
  update-games:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run parser
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: python backend/parser.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ backend/skipped_ids.json backend/steamspy_page_progress.txt
          git add -u games.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Нет изменений — коммит не нужен."
            exit 0
          fi
          git commit -m "chore: автообновление каталога игр ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push отклонён (кто-то запушил параллельно), попытка $i/5: rebase и повтор..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase conflict, aborting rebase"; git rebase --abort; sleep 5; continue; }
            sleep 3
          done
          echo "Не удалось запушить после 5 попыток"
          exit 1
