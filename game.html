<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">SkippyGames — Карточка игры</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="16" stroke="#00e5ff" stroke-width="1.2" opacity=".38"/><circle cx="17" cy="17" r="11" fill="url(#lg0)"/><path d="M11 19 Q13 14 17 12 Q21 14 23 19 Q20 24 17 25 Q14 24 11 19Z" fill="rgba(0,229,255,.28)" stroke="#00e5ff" stroke-width=".7"/><circle cx="17" cy="18" r="3.2" fill="#9333ea"/><circle cx="17" cy="18" r="1.6" fill="#00e5ff"/><defs><linearGradient id="lg0" x1="6" y1="6" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#0a0a1e"/><stop offset="1" stop-color="#18082c"/></linearGradient></defs></svg>
    <span class="logo-txt">Skippy<span>Games</span></span>
  </a>
  <div class="nav-links"><a href="index.html">🎮 Каталог</a></div>
  <button class="nav-wish" id="navWishBtn" onclick="location.href='index.html'">♥ Wishlist <span class="nav-wish-n" data-wishlist-count>0</span></button>
</nav>

<main id="gamePage">
  <a href="index.html" class="back-link" style="margin:1rem 0 .6rem">← Вернуться в каталог</a>
  <div id="gameContent">
    <div class="shimmer-card" style="aspect-ratio:460/215;margin-bottom:1rem"><div class="shimmer-img" style="aspect-ratio:auto;height:100%"></div></div>
  </div>
</main>

<footer>
  <p>© <span id="footYear"></span> SkippyGames — Магазин игр и внутриигровой валюты</p>
  <p style="margin-top:.3rem"><a href="https://www.youtube.com/@SkippyGames" target="_blank" rel="noopener">YouTube</a> · <a href="https://www.twitch.tv/shadowskippy" target="_blank" rel="noopener">Twitch</a> · <a href="https://vk.com/skippygames" target="_blank" rel="noopener">ВКонтакте</a> · <a href="https://t.me/SKIPPYManager" target="_blank" rel="noopener">Telegram</a></p>
</footer>

<div id="toast-wrap"></div>
<button id="toTop" title="Наверх" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>

<div id="lightbox">
  <button class="lb-btn lb-close" id="lbClose">✕</button>
  <button class="lb-btn lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="Screenshot">
  <button class="lb-btn lb-next" id="lbNext">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<div id="chat-widget">
  <div class="chat-win" id="chatWin">
    <div class="chat-head">
      <div class="chat-av"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div><div class="ch-name">SkippyGames</div><div class="ch-status">Онлайн</div></div>
      <button class="chat-close" id="chatClose">✕</button>
    </div>
    <div class="chat-actions">
      <a href="https://vk.me/skippygames" target="_blank" rel="noopener" class="chat-btn-vk">
        <span class="chat-btn-badge">VK</span>
        Открыть чат ВКонтакте
      </a>
      <a href="https://t.me/SKIPPYManager" target="_blank" rel="noopener" class="chat-btn-tg">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M23.91 3.79 20.3 20.84c-.25 1.21-.98 1.5-2 .94l-5.5-4.07-2.66 2.57c-.3.3-.55.56-1.1.56l.4-5.56 10.1-9.15c.44-.4-.1-.6-.68-.2L7.1 13.08l-5.42-1.7c-1.18-.37-1.2-1.18.25-1.75l21.14-8.14c.98-.36 1.83.24 1.83 1.5z"/></svg>
        Написать в Telegram
      </a>
    </div>
  </div>
  <button class="chat-toggle" id="chatToggle">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
</div>

<script src="common.js"></script>
<script src="game.js"></script>
</body>
</html>
